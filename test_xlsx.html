<!DOCTYPE html>
<html>
<head>
    <title>XLSX Library Test</title>
</head>
<body>
    <h1>XLSX Library Test</h1>
    <p>Check the console for test results</p>
    <button id="runTest">Run Test</button>
    <div id="results" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc;"></div>
    
    <script>
        document.getElementById('runTest').addEventListener('click', function() {
            const results = document.getElementById('results');
            results.innerHTML = 'Running test...';
            
            // Create script element to load the XLSX library
            const script = document.createElement('script');
            script.src = 'xlsx.full.min.js';
            document.head.appendChild(script);
            
            script.onload = function() {
                try {
                    results.innerHTML += '<p>XLSX library loaded successfully</p>';
                    
                    // Check if XLSX is available
                    if (typeof XLSX === 'undefined') {
                        results.innerHTML += '<p style="color: red;">ERROR: XLSX is not defined!</p>';
                        return;
                    }
                    
                    results.innerHTML += '<p>XLSX object available: ' + (typeof XLSX) + '</p>';
                    results.innerHTML += '<p>XLSX utils available: ' + (typeof XLSX.utils) + '</p>';
                    results.innerHTML += '<p>XLSX book_new function available: ' + (typeof XLSX.utils?.book_new) + '</p>';
                    results.innerHTML += '<p>XLSX write function available: ' + (typeof XLSX.write) + '</p>';
                    
                    // Try to create a simple workbook
                    const wb = XLSX.utils.book_new();
                    results.innerHTML += '<p>Created workbook successfully</p>';
                    
                    // Create a worksheet with test data
                    const wsData = [
                        ['Name', 'Age'],
                        ['John', 30],
                        ['Jane', 25]
                    ];
                    
                    const ws = XLSX.utils.aoa_to_sheet(wsData);
                    results.innerHTML += '<p>Created worksheet successfully</p>';
                    
                    // Add worksheet to workbook
                    XLSX.utils.book_append_sheet(wb, ws, 'Test');
                    results.innerHTML += '<p>Added worksheet to workbook successfully</p>';
                    
                    // Generate XLSX content
                    const opts = { bookType: 'xlsx', type: 'array' };
                    const wbout = XLSX.write(wb, opts);
                    results.innerHTML += '<p>Generated XLSX content, size: ' + wbout.byteLength + ' bytes</p>';
                    
                    // Create blob
                    const blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    results.innerHTML += '<p>Created blob, size: ' + blob.size + ' bytes</p>';
                    
                    // Create download link
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'test_export.xlsx';
                    a.innerHTML = 'Download Test XLSX File';
                    a.style.display = 'block';
                    a.style.margin = '20px 0';
                    a.style.padding = '10px';
                    a.style.backgroundColor = '#4CAF50';
                    a.style.color = 'white';
                    a.style.textAlign = 'center';
                    a.style.textDecoration = 'none';
                    
                    results.appendChild(a);
                    
                    // Test successful
                    results.innerHTML += '<p style="color: green; font-weight: bold;">XLSX library test PASSED!</p>';
                } catch (err) {
                    results.innerHTML += '<p style="color: red;">XLSX library test FAILED! Error: ' + err.message + '</p>';
                    console.error('Test failed:', err);
                }
            };
            
            script.onerror = function(err) {
                results.innerHTML += '<p style="color: red;">Failed to load XLSX library: ' + err + '</p>';
            };
        });
    </script>
</body>
</html>
